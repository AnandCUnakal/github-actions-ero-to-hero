name: Artifact Transfer

on: push

jobs:
  create-file:
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: |
          echo "Hello from Job 1" > message.txt

      - name: Upload file
        uses: actions/upload-artifact@v4
        with:
          name: shared-file
          path: message.txt

  use-file:
    runs-on: ubuntu-latest
    needs: create-file

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-file

      - name: Print file
        run: cat message.txt
