name: Docker Build & Push

on:
  push:
    branches:
      - main
      - feature/*   # to test non-main behavior

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set short SHA
      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Step 3: Build Docker image
      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:sha-${SHORT_SHA} .

      # Step 4: Login to Docker Hub
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 5: Push images
      - name: Push images
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:sha-${SHORT_SHA}
