name: Job Outputs Example

on: push

jobs:
  generate-date:
    runs-on: ubuntu-latest
    outputs:
      today: ${{ steps.setdate.outputs.today }}

    steps:
      - id: setdate
        run: echo "today=$(date)" >> $GITHUB_OUTPUT

  use-date:
    runs-on: ubuntu-latest
    needs: generate-date

    steps:
      - run: echo "Date from previous job: ${{ needs.generate-date.outputs.today }}"
